name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}-${{ github.event.action || 'push' }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analyze-python:
    name: CodeQL Python analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3 release branch, 2026-07-22
        with:
          languages: python
      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3 release branch, 2026-07-22
