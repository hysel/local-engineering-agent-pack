name: Package Development Builds

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: package-development-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.label }} portable package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            executable: dist/portable/bundle/haven42/haven42.exe
          - os: ubuntu-latest
            label: Linux
            executable: dist/portable/bundle/haven42/haven42
          - os: macos-latest
            label: macOS
            executable: dist/portable/bundle/haven42/haven42

    steps:
      - name: Checkout repository without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinned build dependency
        run: python -m pip install --disable-pip-version-check -r package/requirements-build.txt

      - name: Build unsigned one-folder package and evidence
        run: python scripts/build-portable-development-package.py

      - name: Run source/package parity and native smoke test
        run: python scripts/test-portable-package.py --executable "${{ matrix.executable }}"

      - name: Upload unsigned development artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: haven42-${{ runner.os }}-${{ runner.arch }}-unsigned-development
          path: dist/portable/artifacts/
          if-no-files-found: error
          retention-days: 7
