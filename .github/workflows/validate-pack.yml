name: Validate Pack

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: validate-pack-${{ github.workflow }}-${{ github.ref }}-${{ github.event.action || 'push' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  privacy:
    name: Public repository privacy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout complete public history without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject reachable local setup and private identity data
        run: python scripts/verify-public-repository-privacy.py

  wiki:
    name: Wiki synchronization
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Clone wiki
        shell: bash
        run: git clone --depth 1 "https://github.com/${GITHUB_REPOSITORY}.wiki.git" "$RUNNER_TEMP/haven-42.wiki"

      - name: Verify mapped wiki pages
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if ./scripts/sync-wiki.linux.sh --wiki-path "$RUNNER_TEMP/haven-42.wiki" --check; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep 5
              git -C "$RUNNER_TEMP/haven-42.wiki" pull --ff-only
            fi
          done
          exit 1

  windows:
    name: Windows PowerShell validation
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run full pack tests
        shell: pwsh
        run: ./scripts/test-pack.ps1 -Tier Full -NoReceipt

  validate:
    name: Linux script smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run full Linux test wrapper
        shell: bash
        run: ./scripts/test-pack.linux.sh --tier full --no-receipt

      - name: Run Linux hardware profile smoke test
        shell: bash
        run: |
          ./scripts/get-local-model-profile.linux.sh
          ./scripts/get-local-model-profile.linux.sh --json

      - name: Run Linux installer wrapper smoke test
        shell: bash
        run: |
          target_repo="$(mktemp -d)"
          ./scripts/install-continue-pack.linux.sh --target-repo "$target_repo" --dry-run

      - name: Run Linux runtime context smoke test
        shell: bash
        run: |
          target_repo="$(mktemp -d)"
          mkdir -p "$target_repo/src"
          printf '# Sample\n' > "$target_repo/README.md"
          printf 'public class App { }\n' > "$target_repo/src/App.cs"
          ./scripts/generate-runtime-context.linux.sh --target-repo "$target_repo" --output-path "$target_repo/runtime-context.md"
          test -f "$target_repo/runtime-context.md"

      - name: Run Linux runtime validation wrapper smoke test
        shell: bash
        run: |
          missing_repo="$(mktemp -d)"
          rm -rf "$missing_repo"
          if ./scripts/run-runtime-validation.linux.sh --target-repo "$missing_repo"; then
            echo "Runtime validation should fail for a missing target repository." >&2
            exit 1
          fi

  macos-smoke:
    name: macOS script smoke tests
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run full macOS test wrapper
        shell: bash
        run: ./scripts/test-pack.macos.sh --tier full --no-receipt

      - name: Validate every macOS wrapper surface
        shell: bash
        run: ./scripts/test-macos-script-surface.macos.sh

      - name: Run macOS hardware profile smoke test
        shell: bash
        run: |
          ./scripts/get-local-model-profile.macos.sh
          ./scripts/get-local-model-profile.macos.sh --json

      - name: Run macOS installer wrapper smoke test
        shell: bash
        run: |
          target_repo="$(mktemp -d)"
          ./scripts/install-continue-pack.macos.sh --target-repo "$target_repo" --dry-run

      - name: Run macOS runtime context smoke test
        shell: bash
        run: |
          target_repo="$(mktemp -d)"
          mkdir -p "$target_repo/src"
          printf '# Sample\n' > "$target_repo/README.md"
          printf 'public class App { }\n' > "$target_repo/src/App.cs"
          ./scripts/generate-runtime-context.macos.sh --target-repo "$target_repo" --output-path "$target_repo/runtime-context.md"
          test -f "$target_repo/runtime-context.md"

      - name: Run macOS runtime validation wrapper smoke test
        shell: bash
        run: |
          missing_repo="$(mktemp -d)"
          rm -rf "$missing_repo"
          if ./scripts/run-runtime-validation.macos.sh --target-repo "$missing_repo"; then
            echo "Runtime validation should fail for a missing target repository." >&2
            exit 1
          fi

  package:
    name: ${{ matrix.label }} portable package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            executable: dist/portable/bundle/haven42/haven42.exe
          - os: ubuntu-latest
            label: Linux
            executable: dist/portable/bundle/haven42/haven42
          - os: macos-latest
            label: macOS
            executable: dist/portable/bundle/haven42/haven42

    steps:
      - name: Checkout repository without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install hash-locked build dependencies
        run: python -m pip install --disable-pip-version-check --require-hashes -r package/requirements-build.txt

      - name: Build unsigned one-folder package and evidence
        env:
          HAVEN42_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python scripts/build-portable-development-package.py

      - name: Run source/package parity and native hostile tests
        run: python scripts/test-portable-package.py --executable "${{ matrix.executable }}"

      - name: Verify archive, checksums, SBOM, notices, and provenance
        run: python scripts/verify-portable-development-artifacts.py --artifact-directory dist/portable/artifacts --self-test

      - name: Upload unsigned development artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: haven42-${{ runner.os }}-${{ runner.arch }}-unsigned-development
          path: dist/portable/artifacts/
          if-no-files-found: error
          retention-days: 7
